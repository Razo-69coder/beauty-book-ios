name: BeautyBook
options:
  bundleIdPrefix: com.beautybook
  deploymentTarget:
    iOS: "15.0"

settings:
  base:
    SWIFT_VERSION: "5.0"
    TARGETED_DEVICE_FAMILY: "1"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGNING_REQUIRED: "NO"
    CODE_SIGNING_ALLOWED: "NO"

targets:
  BeautyBook:
    type: application
    platform: iOS
    sources:
      - path: .
        excludes:
          - "*.yml"
          - ".github"
          - "codemagic.yaml"
          - "project.yml"
          - "Package.swift"
          - "commit.ps1"
          - "push*.ps1"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.beautybook.app
        INFOPLIST_FILE: Info.plist
        DEVELOPMENT_TEAM: ""
    info:
      path: Info.plist
      properties:
        CFBundleName: BeautyBook
        CFBundleDisplayName: Beauty Book
        CFBundleIdentifier: com.beautybook.app
        CFBundleVersion: "1"
        CFBundleShortVersionString: "1.0.0"
        CFBundlePackageType: APPL
        CFBundleExecutable: BeautyBook
    dependencies: []