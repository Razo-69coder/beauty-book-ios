name: BeautyBook
options:
  bundleIdPrefix: com.beautybook
  deploymentTarget:
    iOS: "17.0"

settings:
  base:
    SWIFT_VERSION: "5.0"
    TARGETED_DEVICE_FAMILY: "1"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGNING_REQUIRED: "NO"
    CODE_SIGNING_ALLOWED: "NO"

targets:
  BeautyBook:
    type: application
    platform: iOS
    sources:
      - path: .
        excludes:
          - "*.yml"
          - ".github"
          - "codemagic.yaml"
          - "project.yml"
          - "Package.swift"
          - "commit.ps1"
          - "push*.ps1"
          - ".git"
    resources:
      - path: .
        includes:
          - "*.png"
          - "*.jpg"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.beautybook.app
        INFOPLIST_FILE: Info.plist
        DEVELOPMENT_TEAM: ""
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
        INFOPLIST_KEY_UIRequiresFullScreen: YES
        TARGETED_DEVICE_FAMILY: "1"
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: NO
    info:
      path: Info.plist
      properties:
        CFBundleName: BeautyBook
        CFBundleDisplayName: Beauty Book
        CFBundleIdentifier: com.beautybook.app
        CFBundleVersion: "1"
        CFBundleShortVersionString: "1.0.0"
        CFBundlePackageType: APPL
        CFBundleExecutable: BeautyBook
        UILaunchScreen:
          UIColorName: ""
        UIRequiresFullScreen: true
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSContactsUsageDescription: "Beauty Book использует контакты для быстрого добавления клиентов"
        NSCameraUsageDescription: "Beauty Book использует камеру для фото работ клиента"
        NSPhotoLibraryUsageDescription: "Beauty Book использует галерею для фото работ клиента"
        NSPhotoLibraryAddUsageDescription: "Beauty Book сохраняет фото работ"
    dependencies: []