name: SolvoBeauty
options:
  bundleIdPrefix: com.solvobeauty
  deploymentTarget:
    iOS: "17.0"

settings:
  base:
    SWIFT_VERSION: "5.0"
    TARGETED_DEVICE_FAMILY: "1"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "60"
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGNING_REQUIRED: "NO"
    CODE_SIGNING_ALLOWED: "NO"

targets:
  SolvoBeauty:
    type: application
    platform: iOS
    sources:
      - path: .
        excludes:
          - "*.yml"
          - ".github"
          - "codemagic.yaml"
          - "project.yml"
          - "Package.swift"
          - "commit.ps1"
          - "push*.ps1"
          - ".git"
    resources:
      - path: .
        includes:
          - "*.png"
          - "*.jpg"
      - path: Assets.xcassets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.beautybook.app.53C33F97M2
        INFOPLIST_FILE: Info.plist
        DEVELOPMENT_TEAM: ""
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
        CODE_SIGN_ENTITLEMENTS: BeautyBook.entitlements
        INFOPLIST_KEY_UIRequiresFullScreen: YES
        TARGETED_DEVICE_FAMILY: "1"
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    info:
      path: Info.plist
      properties:
        CFBundleName: SolvoBeauty
        CFBundleDisplayName: Solvo Beauty
        CFBundleIdentifier: com.beautybook.app.53C33F97M2
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        CFBundleShortVersionString: "1.0.0"
        CFBundlePackageType: APPL
        CFBundleExecutable: SolvoBeauty
        CFBundleIconName: AppIcon
        UILaunchScreen:
          UIColorName: ""
        UIRequiresFullScreen: true
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSContactsUsageDescription: "Solvo Beauty использует контакты для быстрого добавления клиентов"
        NSCameraUsageDescription: "Solvo Beauty использует камеру для фото работ клиента"
        NSPhotoLibraryUsageDescription: "Solvo Beauty использует галерею для фото работ клиента"
        NSPhotoLibraryAddUsageDescription: "Solvo Beauty сохраняет фото работ"
    dependencies: []