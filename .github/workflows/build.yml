name: Build iOS
on: [push]
jobs:
  build:
    runs-on: macos-14
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: Download XcodeGen
        run: |
          curl -Ls https://github.com/yonaskolb/XcodeGen/releases/download/2.43.0/xcodegen-2.43.0-mac.zip -o xcodegen.zip
          unzip -q xcodegen.zip
          chmod +x xcodegen/bin/xcodegen

      - name: Generate project
        run: |
          ./xcodegen/bin/xcodegen generate

      - name: Build
        run: |
          xcodebuild -project BeautyBook.xcodeproj -scheme BeautyBook -configuration Debug -destination 'platform=iOS Simulator,name=iPhone 16' CODE_SIGNING_ALLOWED=NO

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: BeautyBook
          path: build/Debug-iphonesimulator/BeautyBook.app