name: Build iOS
on: [push]
jobs:
  build:
    runs-on: macos-14
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: Create project.yml
        run: |
          cat > project.yml << 'EOF'
name: BeautyBook
options:
  bundleIdPrefix: com.beautybook
  deploymentTarget:
    iOS: "15.0"
settings:
  base:
    SWIFT_VERSION: "5.0"
    TARGETED_DEVICE_FAMILY: "1"
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGNING_REQUIRED: "NO"
    CODE_SIGNING_ALLOWED: "NO"
targets:
  BeautyBook:
    type: application
    platform: iOS
    sources:
      - path: .
        excludes:
          - "*.yml"
          - ".github"
          - "project.yml"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.beautybook.app
        INFOPLIST_FILE: Info.plist
        DEVELOPMENT_TEAM: ""
    info:
      path: Info.plist
      properties:
        CFBundleName: BeautyBook
        CFBundleDisplayName: Beauty Book
        CFBundleIdentifier: com.beautybook.app
        CFBundleVersion: "1"
        CFBundleShortVersionString: "1.0.0"
        CFBundlePackageType: APPL
        CFBundleExecutable: BeautyBook
EOF

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build
        run: >
          xcodebuild -project BeautyBook.xcodeproj -scheme BeautyBook 
          -configuration Debug 
          -destination 'platform=iOS Simulator,name=iPhone 16' 
          CODE_SIGNING_ALLOWED=NO

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: BeautyBook
          path: build/Debug-iphonesimulator/BeautyBook.app