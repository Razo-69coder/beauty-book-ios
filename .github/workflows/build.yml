name: Build iOS
on: [push]
jobs:
  build:
    runs-on: macos-14
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: Install XcodeGen
        run: |
          sudo xcode-select -s /Applications/Xcode.app
          sudo /usr/bin/gem install xcodegen --no-document

      - name: Generate
        run: xcodegen generate

      - name: Build
        run: |
          xcodebuild -project BeautyBook.xcodeproj -scheme BeautyBook -configuration Debug -destination 'platform=iOS Simulator,name=iPhone 16' CODE_SIGNING_ALLOWED=NO

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: BeautyBook
          path: build/Debug-iphonesimulator/*.app