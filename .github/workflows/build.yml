name: Build iOS
on: [push]
jobs:
  build:
    runs-on: macos-14
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: Create project.yml
        run: >
          echo "name: BeautyBook" > project.yml &&
          echo "options:" >> project.yml &&
          echo "  bundleIdPrefix: com.beautybook" >> project.yml &&
          echo "  deploymentTarget:" >> project.yml &&
          echo "    iOS: '15.0'" >> project.yml

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build
        run: >
          xcodebuild -project BeautyBook.xcodeproj -scheme BeautyBook 
          -configuration Debug 
          -destination 'platform=iOS Simulator,name=iPhone 16' 
          CODE_SIGNING_ALLOWED=NO

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: BeautyBook
          path: build/Debug-iphonesimulator/BeautyBook.app