workflows:
  ios-workflow:
    name: Beauty Book iOS
    environment:
      xcode: latest
    scripts:
      - name: Install XcodeGen
        script: |
          which xcodegen || brew install xcodegen

      - name: Generate project
        script: |
          xcodegen generate

      - name: Build for simulator
        script: |
          xcodebuild \
            -project BeautyBook.xcodeproj \
            -scheme BeautyBook \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath ./build \
            build

    artifacts:
      - ./build/Build/Products/Debug-iphonesimulator/BeautyBook.app