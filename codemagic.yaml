workflows:
  ios-workflow:
    name: Beauty Book iOS
    environment:
      xcode: latest
    scripts:
      - name: Install XcodeGen
        script: |
          which xcodegen || brew install xcodegen
      - name: Generate project
        script: |
          xcodegen generate
      - name: Build iOS app
        script: |
          xcodebuild -project BeautyBook.xcodeproj -scheme BeautyBook -configuration Debug -destination 'platform=iOS Simulator,name=iPhone 17' build CODE_SIGNING_ALLOWED=NO
      - name: Copy artifacts
        script: |
          cp -r ~/Library/Developer/Xcode/DerivedData/BeautyBook-*/Build/Products/Debug-iphonesimulator/BeautyBook.app .
    artifacts:
      - BeautyBook.app