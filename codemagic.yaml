workflows:
  ios-testflight:
    name: Solva Beauty - TestFlight
    environment:
      xcode: latest
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.beautybook.app.53C33F97M2
    scripts:
      - name: Install XcodeGen
        script: |
          which xcodegen || brew install xcodegen

      - name: Generate project
        script: |
          xcodegen generate

      - name: Set build number
        script: |
          agvtool new-version -all $(($(app-store-connect get-latest-testflight-build-number "com.beautybook.app.53C33F97M2") + 1))

      - name: Build for App Store
        script: |
          xcodebuild \
            -project BeautyBook.xcodeproj \
            -scheme BeautyBook \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -archivePath ./build/BeautyBook.xcarchive \
            archive

      - name: Export IPA
        script: |
          xcodebuild \
            -exportArchive \
            -archivePath ./build/BeautyBook.xcarchive \
            -exportOptionsPlist ./export_options.plist \
            -exportPath ./build/ipa

      - name: Upload to TestFlight
        script: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$APP_STORE_CONNECT_PRIVATE_KEY" > ~/.appstoreconnect/private_keys/AuthKey_$APP_STORE_CONNECT_KEY_IDENTIFIER.p8
          IPA=$(find ./build/ipa -name "*.ipa" | head -1)
          xcrun altool --upload-app \
            --type ios \
            --file "$IPA" \
            --apiKey "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            --apiIssuer "$APP_STORE_CONNECT_ISSUER_ID"

    artifacts:
      - ./build/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log


