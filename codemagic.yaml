workflows:
  ios-workflow:
    name: Beauty Book iOS
    environment:
      xcode: latest
    scripts:
      - name: Install XcodeGen
        script: |
          which xcodegen || brew install xcodegen

      - name: Generate project
        script: |
          xcodegen generate

      - name: Build for device (unsigned)
        script: |
          xcodebuild \
            -project BeautyBook.xcodeproj \
            -scheme BeautyBook \
            -configuration Debug \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -derivedDataPath ./build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            build

      - name: Package as IPA
        script: |
          mkdir -p Payload
          cp -r ./build/Build/Products/Debug-iphoneos/BeautyBook.app Payload/
          zip -r BeautyBook.ipa Payload
          rm -rf Payload

    artifacts:
      - BeautyBook.ipa
