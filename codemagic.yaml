workflows:
  ios-testflight:
    name: Solva Beauty - TestFlight
    environment:
      xcode: latest
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.beautybook.app.53C33F97M2
    scripts:
      - name: Install XcodeGen
        script: |
          which xcodegen || brew install xcodegen

      - name: Generate project
        script: |
          xcodegen generate

      - name: Set build number
        script: |
          agvtool new-version -all $(($(app-store-connect get-latest-testflight-build-number "com.beautybook.app.53C33F97M2") + 1))

      - name: Build for App Store
        script: |
          xcodebuild \
            -project BeautyBook.xcodeproj \
            -scheme BeautyBook \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -archivePath ./build/BeautyBook.xcarchive \
            archive

      - name: Export IPA
        script: |
          xcodebuild \
            -exportArchive \
            -archivePath ./build/BeautyBook.xcarchive \
            -exportOptionsPlist ./export_options.plist \
            -exportPath ./build/ipa

    artifacts:
      - ./build/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true


