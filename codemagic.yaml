workflows:
  ios-testflight:
    name: Solva Beauty - TestFlight
    environment:
      xcode: latest
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.beautybook.app
      vars:
        APP_STORE_CONNECT_ISSUER_ID: $APP_STORE_CONNECT_ISSUER_ID
        APP_STORE_CONNECT_KEY_IDENTIFIER: $APP_STORE_CONNECT_KEY_IDENTIFIER
        APP_STORE_CONNECT_PRIVATE_KEY: $APP_STORE_CONNECT_PRIVATE_KEY
    scripts:
      - name: Install XcodeGen
        script: |
          which xcodegen || brew install xcodegen

      - name: Generate project
        script: |
          xcodegen generate

      - name: Set version
        script: |
          agvtool new-marketing-version 1.0.0
          agvtool new-version -all 1

      - name: Build for App Store
        script: |
          xcodebuild \
            -project BeautyBook.xcodeproj \
            -scheme BeautyBook \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -archivePath ./build/BeautyBook.xcarchive \
            archive

      - name: Export IPA
        script: |
          xcodebuild \
            -exportArchive \
            -archivePath ./build/BeautyBook.xcarchive \
            -exportOptionsPlist /Users/builder/export_options.plist \
            -exportPath ./build/ipa

    artifacts:
      - ./build/ipa/*.ipa

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
