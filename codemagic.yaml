workflows:
  ios-testflight:
    name: Solva Beauty - TestFlight
    environment:
      xcode: latest
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.beautybook.app.53C33F97M2
    scripts:
      - name: Install XcodeGen
        script: |
          which xcodegen || brew install xcodegen

      - name: Generate app icons
        script: |
          mkdir -p Assets.xcassets/AppIcon.appiconset
          LOGO="solva_logo.png"
          OUT="Assets.xcassets/AppIcon.appiconset"
          sips -z 40 40   "$LOGO" --out "$OUT/icon_20@2x.png"
          sips -z 60 60   "$LOGO" --out "$OUT/icon_20@3x.png"
          sips -z 58 58   "$LOGO" --out "$OUT/icon_29@2x.png"
          sips -z 87 87   "$LOGO" --out "$OUT/icon_29@3x.png"
          sips -z 80 80   "$LOGO" --out "$OUT/icon_40@2x.png"
          sips -z 120 120 "$LOGO" --out "$OUT/icon_40@3x.png"
          sips -z 120 120 "$LOGO" --out "$OUT/icon_60@2x.png"
          sips -z 180 180 "$LOGO" --out "$OUT/icon_60@3x.png"
          # 1024x1024 must NOT have alpha channel — flatten via JPEG
          sips -z 1024 1024 "$LOGO" --out /tmp/icon_1024.jpg --setProperty format jpeg
          sips /tmp/icon_1024.jpg --out "$OUT/icon_1024.png" --setProperty format png

      - name: Generate project
        script: |
          xcodegen generate

      - name: Set build number
        script: |
          BUILD_NUM=$(grep 'CURRENT_PROJECT_VERSION' project.yml | grep -oE '[0-9]+' | head -1)
          echo "Setting build number: $BUILD_NUM"
          agvtool new-version -all $BUILD_NUM

      - name: Build for App Store
        script: |
          xcodebuild \
            -project SolvoBeauty.xcodeproj \
            -scheme SolvoBeauty \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -archivePath ./build/BeautyBook.xcarchive \
            CODE_SIGNING_REQUIRED=YES \
            CODE_SIGNING_ALLOWED=YES \
            CODE_SIGN_STYLE=Automatic \
            DEVELOPMENT_TEAM=53C33F97M2 \
            archive

      - name: Export IPA
        script: |
          xcodebuild \
            -exportArchive \
            -archivePath ./build/BeautyBook.xcarchive \
            -exportOptionsPlist ./export_options.plist \
            -exportPath ./build/ipa

      - name: Upload to TestFlight
        script: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "" | base64 -d > ~/.appstoreconnect/private_keys/AuthKey_VK5U33NHSR.p8
          IPA=$(find ./build/ipa -name "*.ipa" | head -1)
          xcrun altool --upload-app \
            --type ios \
            --file "$IPA" \
            --apiKey "VK5U33NHSR" \
            --apiIssuer "28f09b58-6de2-42ee-9c2c-116ba4d3f74b"

    artifacts:
      - ./build/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log




