workflows:
  ios-workflow:
    name: Beauty Book iOS
    environment:
      xcode: latest
    scripts:
      - name: Install XcodeGen
        script: |
          which xcodegen || brew install xcodegen

      - name: Generate project
        script: |
          xcodegen generate

      - name: Build for device
        script: |
          xcodebuild \
            -project BeautyBook.xcodeproj \
            -scheme BeautyBook \
            -configuration Debug \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            -derivedDataPath ./build \
            build

      - name: Package IPA
        script: |
          mkdir -p ./build/Payload
          cp -r "./build/Build/Products/Debug-iphoneos/BeautyBook.app" ./build/Payload/
          cd ./build && zip -r BeautyBook.ipa Payload

    artifacts:
      - ./build/BeautyBook.ipa
