workflows:
  ios-workflow:
    name: Beauty Book iOS
    environment:
      xcode: latest
      flutter: stable
    scripts:
      - name: Install XcodeGen
        script: |
          if ! command -v xcodegen &> /dev/null; then
            brew install xcodegen
          fi
      - name: Generate project
        script: |
          xcodegen generate
      - name: Build iOS app
        script: |
          xcodebuild -project BeautyBook.xcodeproj -scheme BeautyBook -configuration Debug -destination 'platform=iOS Simulator,name=iPhone 17' build CODE_SIGNING_ALLOWED=NO
    artifacts:
      - build/Debug-iphonesimulator/*.app